name: Deploy to GitHub Pages

on:
  # 每次推送到 main 分支时触发
  push:
    branches:
      - main
  # 允许手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个部署任务同时运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 Node.js（可选，用于构建）
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3. 上传构建产物（本项目无需构建，直接上传）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传整个根目录
          path: '.'

      # 4. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
